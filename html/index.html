<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <title>Dashboard</title>
</head>

<body>
    <!-- Estrutura -->
    <div class="container">
        <!-- Sidebar - barra do lado -->
        <!-- Menu lateral -->
        <aside class="sidebar" id="sidebar">
            <div class="perfil"> <img src="img/user.png">
                <h3 class="texto">RENATO ALMEIDA</h3>
                <p class="texto">nome@email.com</p>
            </div>

            <nav class="menu"> 
                <a href="#" class="texto">Dashboard</a>
                <a href="#" class="texto">Central de acompanhamento</a>
                <a href="#" class="texto">Abrir chamado</a>
            </nav>

        </aside>
        <!-- Conteúdo principal -->
        <main class="conteudo">
            <!-- Título Dashboard -->
            <div class="main"></div>
            <header class="topo">
                <div class="left">
                    <button id="menu-btn">☰</button>
                </div>

                <div class="center">
                    <h1>Dashboard Analítico</h1>
                    <p class="subtitulo">Monitor de atividades e evolução de performance</p>
                </div>

                <div class="right">
                    <img src="img/logo.png" class="logo">
                    <img src="img/brasil.png" class="flag">
                </div>
            </header>

    </div>
    <!-- Gráfico - grid igual ao figma -->
    <section class="grafico">

        <div class="grafico-topo">
            <h2>Uso diário</h2>
            <div class="filtro"> <span>Último mês</span> <button>Mês atual</button> </div>
        </div>

        <div class="calendario" id="calendario">

        </div>

    </section>

    <!-- Cards - Caixas de tempo médio, tempo de sessão e sessões -->
        <section class="cards">
            <div class="card">
                <h3>Sessões</h3>
                <p id="sessao">0</p>
            </div>

            <div class="card">
            <h3>Tempo médio</h3>
            <p id="tempoMedio">00:00</p>
            </div>

            <div class="card">
                <h3>Tempo em sessão</h3>
                <p id="tempoSessao">00:00</p>
            </div>

        </section>
    </main>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
